<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB to TXT</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #555;
      background: #fafafa;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.2rem;
      margin-bottom: 0.6rem;
    }

    .drop-label {
      font-size: 0.95rem;
      color: #444;
    }

    .drop-hint {
      font-size: 0.78rem;
      color: #999;
      margin-top: 0.3rem;
    }

    #status {
      margin-top: 1.4rem;
      font-size: 0.88rem;
      min-height: 1.4em;
      color: #555;
    }

    #status.error { color: #c0392b; }
    #status.success { color: #27ae60; }

    #progress-bar-wrap {
      margin-top: 0.8rem;
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    #progress-bar {
      height: 100%;
      background: #333;
      width: 0%;
      transition: width 0.2s;
    }

    #download-btn {
      display: none;
      margin-top: 1.4rem;
      width: 100%;
      padding: 0.75rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    #download-btn:hover { background: #444; }

    .features {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .feature {
      font-size: 0.78rem;
      color: #777;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>EPUB → TXT</h1>
    <p class="subtitle">上传 EPUB 文件，自动清除广告水印，整理排版后下载 TXT。<br>文件在本地处理，不上传服务器。</p>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".epub">
      <div class="drop-icon">📖</div>
      <div class="drop-label">点击选择或拖拽 EPUB 文件</div>
      <div class="drop-hint">.epub 格式</div>
    </div>

    <div id="status"></div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <button id="download-btn">下载 TXT</button>

    <div class="features">
      <div class="feature">✓ 清除 Z-Library 等广告</div>
      <div class="feature">✓ 竖排文字智能合并</div>
      <div class="feature">✓ 段首两空格缩进</div>
      <div class="feature">✓ 文件不离开浏览器</div>
    </div>
  </div>

  <script>
    // --- Cleaning logic (mirrors convert.py) ---

    const AD_KEYWORDS = [
      "z-library", "www.z-lib.org", "b-ok.cc", "b-ok.org",
      "bookzz.org", "bookfi.net", "uploaded by", "generated by", "calibre"
    ];

    function cleanText(text) {
      const lines = text.split('\n');

      // Pass 1: filter noise
      const filtered = [];
      for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        if (AD_KEYWORDS.some(kw => line.toLowerCase().includes(kw))) continue;
        if (/^\d+$/.test(line) && line.length < 4) continue;
        filtered.push(line);
      }

      // Pass 2: merge consecutive single-char lines (vertical text), add indent
      const merged = [];
      let buffer = [];

      for (const line of filtered) {
        if ([...line].length === 1) {
          buffer.push(line);
        } else {
          if (buffer.length) {
            merged.push('  ' + buffer.join(''));
            buffer = [];
          }
          merged.push('  ' + line);
        }
      }
      if (buffer.length) merged.push('  ' + buffer.join(''));

      return merged.join('\n\n');
    }

    // --- EPUB parsing ---

    async function epubToTxt(arrayBuffer) {
      const zip = await JSZip.loadAsync(arrayBuffer);

      // 1. Find OPF path from container.xml
      const containerXml = await zip.file('META-INF/container.xml').async('string');
      const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
      const rootfileEl = containerDoc.querySelector('rootfile');
      if (!rootfileEl) throw new Error('找不到 container.xml 中的 rootfile');
      const opfPath = rootfileEl.getAttribute('full-path');
      const opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

      // 2. Parse OPF to get manifest (id → href) and spine (ordered ids)
      const opfXml = await zip.file(opfPath).async('string');
      const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

      const manifest = {};
      opfDoc.querySelectorAll('manifest item').forEach(item => {
        manifest[item.getAttribute('id')] = item.getAttribute('href');
      });

      const spineItems = [...opfDoc.querySelectorAll('spine itemref')];
      if (!spineItems.length) throw new Error('找不到 spine 内容');

      // 3. Process each document in spine order
      const chunks = [];
      for (let i = 0; i < spineItems.length; i++) {
        setProgress(Math.round((i / spineItems.length) * 90));

        const idref = spineItems[i].getAttribute('idref');
        const href = manifest[idref];
        if (!href) continue;

        // Resolve path relative to OPF directory
        const filePath = opfDir + href.split('#')[0];
        const fileEntry = zip.file(filePath) || zip.file(decodeURIComponent(filePath));
        if (!fileEntry) continue;

        const html = await fileEntry.async('string');
        const doc = new DOMParser().parseFromString(html, 'text/html');

        // Remove script/style nodes
        doc.querySelectorAll('script, style').forEach(el => el.remove());

        const rawText = doc.body ? doc.body.innerText || doc.body.textContent : '';
        const cleaned = cleanText(rawText);
        if (cleaned.trim()) chunks.push(cleaned);
      }

      setProgress(100);

      // 4. Final join + collapse excessive newlines
      let result = chunks.join('\n\n');
      result = result.replace(/\n{4,}/g, '\n\n\n');
      return result;
    }

    // --- UI ---

    let resultText = '';
    let resultFilename = '';

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const statusEl = document.getElementById('status');
    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar = document.getElementById('progress-bar');
    const downloadBtn = document.getElementById('download-btn');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    function setProgress(pct) {
      progressWrap.style.display = 'block';
      progressBar.style.width = pct + '%';
    }

    function resetProgress() {
      progressWrap.style.display = 'none';
      progressBar.style.width = '0%';
    }

    async function handleFile(file) {
      if (!file || !file.name.endsWith('.epub')) {
        setStatus('请选择 .epub 文件', 'error');
        return;
      }

      downloadBtn.style.display = 'none';
      resetProgress();
      setStatus('正在转换...');

      try {
        const arrayBuffer = await file.arrayBuffer();
        const txt = await epubToTxt(arrayBuffer);

        resultText = txt;
        resultFilename = file.name.replace(/\.epub$/i, '.txt');

        setStatus(`转换完成！共 ${txt.length.toLocaleString()} 字符`, 'success');
        downloadBtn.style.display = 'block';
        downloadBtn.textContent = `下载 ${resultFilename}`;
      } catch (e) {
        setStatus('转换失败：' + e.message, 'error');
        resetProgress();
        console.error(e);
      }
    }

    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = resultFilename;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
