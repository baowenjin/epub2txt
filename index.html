<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB to TXT</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #555;
      background: #fafafa;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .drop-label { font-size: 0.95rem; color: #444; }
    .drop-hint  { font-size: 0.78rem; color: #999; margin-top: 0.3rem; }

    #status {
      margin-top: 1.4rem;
      font-size: 0.88rem;
      min-height: 1.4em;
      color: #555;
    }
    #status.error   { color: #c0392b; }
    #status.success { color: #27ae60; }

    #progress-bar-wrap {
      margin-top: 0.8rem;
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      background: #333;
      width: 0%;
      transition: width 0.2s;
    }

    #download-btn {
      display: none;
      margin-top: 1.4rem;
      width: 100%;
      padding: 0.75rem;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    #download-btn:hover { background: #444; }

    .features {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .feature { font-size: 0.78rem; color: #777; }

    .version {
      position: fixed;
      bottom: 0.6rem;
      right: 0.8rem;
      font-size: 0.68rem;
      color: #bbb;
      font-family: monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>EPUB → TXT</h1>
    <p class="subtitle">上传 EPUB 文件，自动清除广告水印，整理排版后下载 TXT。<br>文件在本地处理，不上传服务器。</p>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".epub">
      <div class="drop-icon">📖</div>
      <div class="drop-label">点击选择或拖拽 EPUB 文件</div>
      <div class="drop-hint">.epub 格式</div>
    </div>

    <div id="status"></div>
    <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    <button id="download-btn">下载 TXT</button>

    <div class="features">
      <div class="feature">✓ 清除 Z-Library 等广告</div>
      <div class="feature">✓ 竖排文字智能合并</div>
      <div class="feature">✓ 段首两空格缩进</div>
      <div class="feature">✓ 文件不离开浏览器</div>
    </div>
  </div>
  <div class="version" id="ver"></div>

  <script>
    // ── Constants ────────────────────────────────────────────────────────────

    const AD_KEYWORDS = [
      "z-library", "www.z-lib.org", "b-ok.cc", "b-ok.org",
      "bookzz.org", "bookfi.net", "uploaded by", "generated by", "calibre"
    ];

    const HEADING_TAGS = new Set(['h1','h2','h3','h4','h5','h6']);
    const BLOCK_TAGS   = new Set(['p','div','section','article','blockquote','li','dt','dd','figure','figcaption','header','footer','details','summary','td','th']);
    const SKIP_TAGS    = new Set(['script','style','nav','aside']);

    // ── Text extraction ──────────────────────────────────────────────────────

    // Walk the body DOM and return structured blocks: {type:'h'|'p', text:string}.
    // Headings become type 'h'; all other block elements become type 'p'.
    // Inline elements contribute their text to the nearest containing block.
    function extractBlocks(body) {
      const blocks = [];

      function walk(node) {
        if (node.nodeType === 3) return node.textContent; // text node
        if (node.nodeType !== 1) return '';
        const tag = node.tagName.toLowerCase();
        if (SKIP_TAGS.has(tag)) return '';
        if (tag === 'br') return '\n';
        if (node.getAttribute('epub:type') === 'pagebreak') return '';

        const children = [...node.childNodes];

        if (HEADING_TAGS.has(tag)) {
          const text = children.map(walk).join('').replace(/\s+/g, ' ').trim();
          if (text) blocks.push({ type: 'h', text });
          return '';
        }
        if (BLOCK_TAGS.has(tag)) {
          const text = children.map(walk).join('').replace(/\s+/g, ' ').trim();
          if (text) blocks.push({ type: 'p', text });
          return '';
        }
        return children.map(walk).join(''); // inline: pass text up
      }

      walk(body);
      return blocks;
    }

    // Format structured blocks into plain text.
    // Headings: no indent, preceded and followed by a blank line.
    // Paragraphs: two-space indent.
    // Consecutive single-char paragraphs are merged (vertical-text fix).
    function formatBlocks(blocks) {
      const lines = [];
      let singleBuf = [];

      function flushSingle() {
        if (singleBuf.length) { lines.push('  ' + singleBuf.join('')); singleBuf = []; }
      }

      for (const { type, text } of blocks) {
        const t = text.trim();
        if (!t) continue;
        if (AD_KEYWORDS.some(kw => t.toLowerCase().includes(kw))) continue;
        if (type === 'p' && /^\d+$/.test(t) && t.length < 4) continue; // page numbers

        if (type === 'h') {
          flushSingle();
          if (lines.length && lines[lines.length - 1] !== '') lines.push('');
          lines.push(t);
          lines.push('');
        } else {
          if ([...t].length === 1) { singleBuf.push(t); }
          else { flushSingle(); lines.push('  ' + t); }
        }
      }
      flushSingle();
      return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
    }

    // ── EPUB parsing ─────────────────────────────────────────────────────────

    // Resolve a relative href against a base directory path,
    // normalizing . and .. segments so JSZip can find the file.
    function resolvePath(baseDir, href) {
      const parts = (baseDir + href).split('/');
      const out = [];
      for (const p of parts) {
        if (p === '..') out.pop();
        else if (p !== '.') out.push(p);
      }
      return out.join('/');
    }

    // getElementsByTagNameNS('*', localName) matches regardless of XML namespace,
    // unlike querySelector which can fail on namespace-qualified XML elements.
    function byTag(doc, localName) {
      return [...doc.getElementsByTagNameNS('*', localName)];
    }

    async function epubToTxt(arrayBuffer) {
      const zip = await JSZip.loadAsync(arrayBuffer);

      // 1. Find OPF path from container.xml
      const containerXml = await zip.file('META-INF/container.xml').async('string');
      const containerDoc = new DOMParser().parseFromString(containerXml, 'application/xml');
      const rootfileEl = byTag(containerDoc, 'rootfile')[0];
      if (!rootfileEl) throw new Error('找不到 container.xml 中的 rootfile');
      const opfPath = rootfileEl.getAttribute('full-path');
      const opfDir  = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

      // 2. Parse OPF to get manifest (id → href) and spine (ordered ids)
      const opfXml = await zip.file(opfPath).async('string');
      const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

      const manifest = {};
      byTag(opfDoc, 'item').forEach(item => {
        const id = item.getAttribute('id'), href = item.getAttribute('href');
        if (id && href) manifest[id] = href;
      });

      const spineItems = byTag(opfDoc, 'itemref');
      if (!spineItems.length) throw new Error('找不到 spine 内容');

      // 3. Process each document in spine order
      const chunks = [];

      for (let i = 0; i < spineItems.length; i++) {
        setProgress(Math.round((i / spineItems.length) * 90));

        const idref = spineItems[i].getAttribute('idref');
        const href  = manifest[idref];
        if (!href) continue;

        const filePath  = resolvePath(opfDir, href.split('#')[0]);
        const fileEntry = zip.file(filePath) || zip.file(decodeURIComponent(filePath));
        if (!fileEntry) continue;

        const bytes  = await fileEntry.async('uint8array');
        const rawHtml = new TextDecoder('utf-8').decode(bytes);
        // XHTML self-closing <script/> and <style/> break HTML parsing —
        // the parser treats them as open tags and swallows all following content.
        const html = rawHtml.replace(/<(script|style)(\s[^>]*)\/>/gi, '<$1$2></$1>');
        const doc  = new DOMParser().parseFromString(html, 'text/html');
        doc.querySelectorAll('script, style').forEach(el => el.remove());

        const cleaned = doc.body ? formatBlocks(extractBlocks(doc.body)) : '';
        if (cleaned) chunks.push(cleaned);
      }

      setProgress(100);
      if (!chunks.length) throw new Error('未提取到任何文本，请确认文件为有效的 EPUB 格式');

      // 4. Join chapters and collapse excessive blank lines
      return chunks.join('\n\n').replace(/\n{4,}/g, '\n\n\n');
    }

    // ── UI ───────────────────────────────────────────────────────────────────

    let resultText     = '';
    let resultFilename = '';

    const dropZone    = document.getElementById('drop-zone');
    const fileInput   = document.getElementById('file-input');
    const statusEl    = document.getElementById('status');
    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar = document.getElementById('progress-bar');
    const downloadBtn = document.getElementById('download-btn');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className   = type;
    }

    function setProgress(pct) {
      progressWrap.style.display = 'block';
      progressBar.style.width    = pct + '%';
    }

    function resetProgress() {
      progressWrap.style.display = 'none';
      progressBar.style.width    = '0%';
    }

    async function handleFile(file) {
      if (!file || !file.name.endsWith('.epub')) {
        setStatus('请选择 .epub 文件', 'error');
        return;
      }

      downloadBtn.style.display = 'none';
      resetProgress();
      setStatus('正在转换...');

      try {
        const txt = await epubToTxt(await file.arrayBuffer());
        resultText     = txt;
        resultFilename = file.name.replace(/\.epub$/i, '.txt');
        setStatus(`转换完成！共 ${txt.length.toLocaleString()} 字符`, 'success');
        downloadBtn.style.display = 'block';
        downloadBtn.textContent   = `下载 ${resultFilename}`;
      } catch (e) {
        setStatus('转换失败：' + e.message, 'error');
        resetProgress();
        console.error(e);
      }
    }

    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = resultFilename; a.click();
      URL.revokeObjectURL(url);
    });

    // Version stamp (reads HTTP Last-Modified header, set by Vercel on deploy)
    (() => {
      const d = new Date(document.lastModified);
      const p = n => String(n).padStart(2, '0');
      document.getElementById('ver').textContent =
        `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
    })();
  </script>
</body>
</html>
